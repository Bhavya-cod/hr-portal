{% extends 'base.html' %}

{% block title %}Password Reset Complete - HR Portal{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 text-center">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
            <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        
        <h2 class="text-3xl font-extrabold text-gray-900 mb-6">Password Reset Complete</h2>
        
        <p class="text-md text-gray-600 mb-8">
            Your password has been successfully updated. You can now log in to your account with your new password.
        </p>

        <div>
            <a href="{% url 'accounts:login' %}" 
               class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition duration-150 ease-in-out">
                Log in to your account
            </a>
        </div>
    </div>
</div>
{% endblock %}
