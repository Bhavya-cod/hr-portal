{% extends 'base.html' %}

{% block title %}Delete Item - HR Portal{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white p-8 rounded-2xl shadow-2xl border border-red-100 transform transition-all duration-300 hover:scale-105">
        
        <div class="flex justify-center mb-6">
            <div class="h-20 w-20 bg-red-100 rounded-full flex items-center justify-center animate-pulse">
                <svg class="h-10 w-10 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
        </div>

        <h2 class="text-3xl font-black text-center text-gray-900 mb-2">Delete Item?</h2>
        
        <p class="text-center text-gray-600 mb-8 pt-2">
            You are about to permanently remove <strong>{{ object }}</strong> from the system. <br/><span class="text-red-500 font-semibold mt-2 inline-block">This action cannot be undone.</span>
        </p>
        
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <button type="submit" 
                        class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-lg text-lg font-bold text-gray-900 bg-gradient-to-r from-orange-500 to-orange-400 hover:from-orange-600 hover:to-orange-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transform transition hover:-translate-y-1">
                    Yes, Delete
                </button>
                <a href="javascript:history.back()" 
                   class="w-full flex justify-center py-4 px-4 border-2 border-orange-500 rounded-xl shadow-sm text-lg font-bold text-orange-600 bg-orange-50 hover:bg-orange-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition">
                    Keep Item
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
